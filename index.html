<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xiaoxuan He | Homepage</title>
    <meta
      name="description"
      content="Academic homepage inspired by Jie Yang's website."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <nav class="site-nav">
          <a href="#biography">Biography</a>
          <a href="#news">News</a>
          <a href="#publications">Publications</a>
          <a href="#experience">Experience</a>
          <a href="#education">Education</a>
          <a href="#honors">Honors</a>
          <a href="#contact">Contact</a>
        </nav>
      </header>

      <main class="content">
        <section class="intro">
          <h1 id="hero-name">Loading...</h1>
          <p id="hero-title" class="intro-title"></p>
          <p id="hero-affiliation" class="intro-meta"></p>
          <p id="hero-location" class="intro-meta"></p>
          <p class="intro-meta">Email: <a id="hero-email" href="#"></a></p>
          <p id="hero-links" class="intro-links"></p>
        </section>

        <section id="biography" class="section">
          <h2>Biography</h2>
          <div id="biography-content" class="section-body prose"></div>
        </section>

        <section id="news" class="section">
          <h2>News</h2>
          <ul id="news-list" class="plain-list"></ul>
        </section>

        <section id="publications" class="section">
          <h2>Selected Publications <span id="scholar-link"></span></h2>
          <div id="publication-list" class="publication-list"></div>
        </section>

        <section id="experience" class="section">
          <h2>Experience</h2>
          <div id="experience-list" class="simple-list"></div>
        </section>

        <section id="education" class="section">
          <h2>Education</h2>
          <div id="education-list" class="simple-list"></div>
        </section>

        <section id="honors" class="section">
          <h2>Honors & Awards</h2>
          <ul id="honor-list" class="plain-list"></ul>
        </section>

        <section id="contact" class="section">
          <h2>Contact</h2>
          <div class="section-body">
            <p id="contact-note"></p>
            <p id="contact-links" class="intro-links"></p>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <p id="footer-text"></p>
      </footer>
    </div>

    <script src="./profile.js"></script>
  </body>
</html>
