<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xiaoxuan He | Homepage</title>
    <meta
      name="description"
      content="Academic homepage template inspired by Jie Yang's homepage."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="#top">Homepage</a>
        <nav class="nav">
          <a href="#biography">Biography</a>
          <a href="#news">News</a>
          <a href="#research">Research</a>
          <a href="#publications">Publications</a>
          <a href="#experience">Experience</a>
          <a href="#contact">Contact</a>
        </nav>
      </header>

      <main id="top" class="layout">
        <section class="hero">
          <div class="hero-copy">
            <p class="eyebrow">Academic Homepage</p>
            <h1 id="hero-name">Loading...</h1>
            <p id="hero-title" class="hero-title"></p>
            <p id="hero-affiliation" class="hero-affiliation"></p>
            <p id="hero-location" class="hero-location"></p>
            <div id="hero-links" class="hero-links"></div>
          </div>
          <aside class="hero-card">
            <div class="hero-card-body">
              <h2 id="card-name"></h2>
              <p id="card-summary"></p>
              <ul id="highlights" class="fact-list"></ul>
            </div>
          </aside>
        </section>

        <section id="biography" class="section">
          <div class="section-heading">
            <p class="section-kicker">01</p>
            <h2>Biography</h2>
          </div>
          <div id="biography-content" class="rich-text"></div>
        </section>

        <section id="news" class="section">
          <div class="section-heading">
            <p class="section-kicker">02</p>
            <h2>News</h2>
          </div>
          <div id="news-list" class="timeline"></div>
        </section>

        <section id="research" class="section">
          <div class="section-heading">
            <p class="section-kicker">03</p>
            <h2>Research Interests</h2>
          </div>
          <div id="research-tags" class="tag-grid"></div>
        </section>

        <section id="publications" class="section">
          <div class="section-heading">
            <p class="section-kicker">04</p>
            <h2>Selected Publications</h2>
          </div>
          <div id="publication-list" class="publication-list"></div>
        </section>

        <section id="experience" class="section split-section">
          <div>
            <div class="section-heading">
              <p class="section-kicker">05</p>
              <h2>Experience</h2>
            </div>
            <div id="experience-list" class="stack-list"></div>
          </div>
          <div>
            <div class="section-heading">
              <p class="section-kicker">06</p>
              <h2>Education & Honors</h2>
            </div>
            <div id="education-list" class="stack-list compact"></div>
            <div id="honor-list" class="award-list"></div>
          </div>
        </section>

        <section id="contact" class="section contact-section">
          <div class="section-heading">
            <p class="section-kicker">07</p>
            <h2>Contact</h2>
          </div>
          <div class="contact-card">
            <p id="contact-note" class="contact-note"></p>
            <div id="contact-links" class="hero-links"></div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p id="footer-text"></p>
      </footer>
    </div>

    <script src="./profile.js"></script>
  </body>
</html>
